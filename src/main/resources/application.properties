spring.application.name=gelox-backend

# Importa credenciales locales (gitignoreado, nunca subir)
spring.config.import=optional:classpath:application-local.properties

# PostgreSQL - Supabase (valores reales en application-local.properties)
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Firebase (ruta definida en application-local.properties)
firebase.service-account-path=

# Puerto
server.port=8080

# Supabase Storage (valores reales en application-local.properties)
supabase.url=
supabase.service-key=

# Multipart (habilitado por defecto, explícito para claridad)
spring.servlet.multipart.enabled=true