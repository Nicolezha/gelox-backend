spring.application.name=gelox-backend

spring.config.import=optional:classpath:application-local.properties

# PostgreSQL - Supabase
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:serviceAccountKey.json}

# Puerto
server.port=${PORT:8080}

# Supabase Storage
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}

# Multipart
spring.servlet.multipart.enabled=true

# Email SMTP — SendGrid
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Remitente del correo de recuperacion
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME:GELOX}

