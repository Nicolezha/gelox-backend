spring.application.name=gelox-backend

spring.config.import=optional:classpath:application-local.properties

# PostgreSQL - Supabase
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:serviceAccountKey.json}
firebase.web-api-key=${FIREBASE_WEB_API_KEY}

# Puerto
server.port=${PORT:8080}

# Supabase Storage
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Supabase Storage — bucket donde se guardan las imágenes
# Crear en Render la variable de entorno SUPABASE_BUCKET con el nombre de tu bucket
supabase.bucket=${SUPABASE_BUCKET:fotos}

# Email SMTP — SendGrid
spring.mail.host=smtp.sendgrid.net
spring.mail.port=2525
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Remitente del correo de recuperacion
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME:GELOX}

# WhatsApp
negocio.whatsapp.numero=573124099628

# Información del negocio
negocio.direccion=Calle 0 Av 9 #9-36
negocio.barrio=Carora
negocio.ciudad=Cucuta
negocio.horario=Lunes a Domingo 10:00am - 9:00pm
negocio.maps.url=https://maps.app.goo.gl/mbuxwjHGfQZjZXoF7

# Silencia el warning de open-in-view
spring.jpa.open-in-view=false

# Fix crítico: evita el error "could not determine data type of parameter $3"
spring.datasource.hikari.data-source-properties.stringtype=unspecified